<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1e40af" rx="20"/>
  
  <!-- Accessibility symbol - stylized person with accessibility focus -->
  <circle cx="50" cy="25" r="10" fill="#ffffff"/>
  
  <!-- Body arms up in accessible gesture -->
  <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Left arm -->
    <path d="M 35 35 Q 25 40 20 30"/>
    <!-- Right arm -->
    <path d="M 65 35 Q 75 40 80 30"/>
    <!-- Body -->
    <line x1="50" y1="35" x2="50" y2="65"/>
    <!-- Left leg -->
    <line x1="50" y1="65" x2="35" y2="85"/>
    <!-- Right leg -->
    <line x1="50" y1="65" x2="65" y2="85"/>
  </g>
  
  <!-- "a11y" text indicator -->
  <text x="50" y="95" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">a11y</text>
</svg>
