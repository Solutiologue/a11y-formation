services:
  # MySQL Database - Production
  db:
    image: mysql:8.0
    container_name: a11y-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"  # Accessible uniquement en local
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - a11y-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Backend API - Production Build
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.prod
    container_name: a11y-backend-prod
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      API_URL: ${API_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - a11y-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend - Production Build (Nginx)
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.prod
    container_name: a11y-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./packages/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro  # For SSL certificates
    networks:
      - a11y-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Reverse Proxy / Load Balancer (optional - Traefik)
  # traefik:
  #   image: traefik:v2.10
  #   container_name: traefik
  #   command:
  #     - "--api.insecure=true"
  #     - "--providers.docker=true"
  #     - "--providers.docker.exposedbydefault=false"
  #     - "--entrypoints.web.address=:80"
  #   ports:
  #     - "80:80"
  #     - "8080:8080"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   networks:
  #     - a11y-network

volumes:
  mysql_data:
    driver: local

networks:
  a11y-network:
    driver: bridge
